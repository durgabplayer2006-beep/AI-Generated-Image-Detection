<!DOCTYPE html>
<html>
<head>
    <title>AI Generated Image Detector</title>

    <style>

        body{
            margin:0;
            font-family:Arial,sans-serif;
            background:linear-gradient(135deg,#667eea,#764ba2);
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .container{
            background:white;
            width:600px;
            padding:40px;
            border-radius:20px;
            text-align:center;
            box-shadow:0px 10px 25px rgba(0,0,0,0.3);
        }

        h1{
            color:#2c3e50;
        }

        p{
            color:#555;
            font-size:20px;
        }

        .upload-btn{
            display:inline-block;
            background:#6c63ff;
            color:white;
            padding:12px 25px;
            border-radius:10px;
            cursor:pointer;
            font-size:18px;
            margin-top:15px;
        }

        .upload-btn input{
            display:none;
        }

        button{
            margin-top:20px;
            background:#6c63ff;
            color:white;
            border:none;
            padding:12px 25px;
            border-radius:10px;
            cursor:pointer;
            font-size:18px;
        }

        button:hover{
            background:#5848d8;
        }

    </style>

</head>

<body>

<div class="container">

    <h1>🤖 AI Generated Image Detector</h1>

    <p>
        Detect whether an image is REAL or AI Generated
        using Convolutional Neural Networks (CNN).
    </p>

    <form action="/predict" method="POST" enctype="multipart/form-data">

        <label class="upload-btn">
            📁 Choose Image
            <input type="file"
                   name="image"
                   accept="image/*"
                   required>
        </label>

        <br>

        <button type="submit">
            🔍 Detect Image
        </button>

    </form>

</div>

</body>
</html>
